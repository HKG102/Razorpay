spring:
  application:
    name: razorpay
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/razorpayDB}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  vault:
    master-key: asdfg3456dfghjrtyuinb56789tyuibn

  payment:
    simulator:
      poll-interval-ms: 5000
      chaos-mode: NORMAL
      methods:
        CARD:
          min-delay-seconds: 2
          max-delay-seconds: 6
          success-rate: 90
        UPI:
          min-delay-seconds: 1
          max-delay-seconds: 3
          success-rate: 95
        NET_BANKING:
          min-delay-seconds: 4
          max-delay-seconds: 10
          success-rate: 80